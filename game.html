<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Cover Card Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: Georgia, serif;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            color: #d4af37;
        }

        h1 {
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .status {
            font-size: 18px;
            min-width: 150px;
        }

        .btn {
            padding: 12px 32px;
            font-size: 18px;
            font-family: Georgia, serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-ready {
            background: #d4af37;
            color: #1a1a2e;
        }

        .btn-ready:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }

        .btn-ready:not(:disabled):hover {
            background: #e5c349;
            transform: scale(1.05);
        }

        .btn-reset {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #444;
            color: #aaa;
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-reset:hover {
            background: #c0392b;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(24, 60px);
            grid-template-rows: repeat(16, 90px);
            gap: 4px;
            justify-content: center;
        }

        .card {
            width: 60px;
            height: 90px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
            position: relative;
        }

        .card:hover:not(.used) {
            transform: scale(1.08);
            z-index: 10;
        }

        .card.selected {
            box-shadow: 0 0 0 3px #d4af37, 0 0 20px #d4af37;
            transform: scale(1.05);
            z-index: 5;
        }

        .card.used {
            cursor: not-allowed;
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .card.used::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                to bottom right,
                transparent 45%,
                #c0392b 45%,
                #c0392b 55%,
                transparent 55%
            ),
            linear-gradient(
                to top right,
                transparent 45%,
                #c0392b 45%,
                #c0392b 55%,
                transparent 55%
            );
            border-radius: 4px;
        }

        .card svg {
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 30px;
        }

        .modal.active {
            display: flex;
        }

        .covers-display {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
        }

        .cover-img {
            height: 400px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .btn-done {
            background: #27ae60;
            color: white;
            padding: 16px 48px;
            font-size: 24px;
        }

        .btn-done:hover {
            background: #2ecc71;
        }
    </style>
</head>
<body>
    <button class="btn btn-reset" onclick="resetGame()">Reset Game</button>

    <div class="header">
        <h1>Pick Your Books</h1>
        <span class="status" id="status">Selected: 0</span>
        <button class="btn btn-ready" id="readyBtn" disabled onclick="showCovers()">Ready</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="modal" id="modal">
        <div class="covers-display" id="coversDisplay"></div>
        <button class="btn btn-done" onclick="dismissModal()">Done</button>
    </div>

    <script>
        const TOTAL_CARDS = 384;
        const STORAGE_KEY = 'bookCardGame';

        let cardMapping = [];
        let usedCards = new Set();
        let selectedCards = new Set();

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function saveState() {
            const state = {
                cardMapping: cardMapping,
                usedCards: Array.from(usedCards)
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const state = JSON.parse(saved);
                cardMapping = state.cardMapping;
                usedCards = new Set(state.usedCards);
            } else {
                cardMapping = shuffleArray(Array.from({length: TOTAL_CARDS}, (_, i) => i + 1));
                saveState();
            }
        }

        function createCardSVG() {
            return `
                <svg viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <pattern id="diamonds" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(45)">
                            <rect width="12" height="12" fill="#1a1a4e"/>
                            <rect x="3" y="3" width="6" height="6" fill="#2a2a6e" rx="1"/>
                        </pattern>
                    </defs>
                    <rect width="60" height="90" rx="4" fill="#0f0f2f"/>
                    <rect x="3" y="3" width="54" height="84" rx="3" fill="url(#diamonds)"/>
                    <rect x="6" y="6" width="48" height="78" rx="2" fill="none" stroke="#d4af37" stroke-width="1"/>
                    <rect x="10" y="10" width="40" height="70" rx="2" fill="none" stroke="#8b7355" stroke-width="0.5"/>
                    <circle cx="30" cy="45" r="12" fill="none" stroke="#d4af37" stroke-width="1"/>
                    <circle cx="30" cy="45" r="8" fill="#1a1a4e" stroke="#8b7355" stroke-width="0.5"/>
                    <path d="M30 37 L32 43 L38 45 L32 47 L30 53 L28 47 L22 45 L28 43 Z" fill="#d4af37"/>
                </svg>
            `;
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            for (let i = 0; i < TOTAL_CARDS; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.position = i;
                card.innerHTML = createCardSVG();

                if (usedCards.has(i)) {
                    card.classList.add('used');
                }

                card.addEventListener('click', () => toggleCard(i));
                grid.appendChild(card);
            }
        }

        function toggleCard(position) {
            if (usedCards.has(position)) return;

            const card = document.querySelector(`.card[data-position="${position}"]`);

            if (selectedCards.has(position)) {
                selectedCards.delete(position);
                card.classList.remove('selected');
            } else {
                if (selectedCards.size >= 5) return;
                selectedCards.add(position);
                card.classList.add('selected');
            }

            updateStatus();
        }

        function updateStatus() {
            const count = selectedCards.size;
            document.getElementById('status').textContent = `Selected: ${count}`;
            document.getElementById('readyBtn').disabled = count < 2 || count > 5;
        }

        function showCovers() {
            const display = document.getElementById('coversDisplay');
            display.innerHTML = '';

            const positions = Array.from(selectedCards).sort((a, b) => a - b);

            for (const pos of positions) {
                const coverNum = cardMapping[pos];
                const img = document.createElement('img');
                img.src = `covers/${coverNum}.jpg`;
                img.className = 'cover-img';
                img.alt = `Book ${coverNum}`;
                display.appendChild(img);
            }

            document.getElementById('modal').classList.add('active');
        }

        function dismissModal() {
            for (const pos of selectedCards) {
                usedCards.add(pos);
                const card = document.querySelector(`.card[data-position="${pos}"]`);
                card.classList.add('used');
                card.classList.remove('selected');
            }

            selectedCards.clear();
            saveState();
            updateStatus();

            document.getElementById('modal').classList.remove('active');
        }

        function resetGame() {
            if (!confirm('Reset the game? All progress will be lost.')) return;
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }

        function initGame() {
            loadState();
            createGrid();
            updateStatus();
        }

        initGame();
    </script>
</body>
</html>
